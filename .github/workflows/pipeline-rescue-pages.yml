name: Publish Pipeline Rescue site

on:
  push:
    branches:
      - main
    paths:
      - "pipeline-rescue/site/**"
      - ".github/workflows/pipeline-rescue-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pipeline-rescue-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check static site links
        run: node pipeline-rescue/site/check-site-links.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pipeline-rescue/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
